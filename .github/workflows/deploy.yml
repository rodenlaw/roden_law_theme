name: Deploy to WP Engine

on:
  push:
    branches:
      - main
    paths:
      - 'wordpress/**'
  # Allow manual re-deploy from the Actions tab (handy for cache flushes,
  # rolling forward after a non-wordpress/ commit, or testing prod auth).
  workflow_dispatch:

concurrency:
  group: deploy-wpengine
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Theme to WP Engine (dev + prod)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WPE_SSHG_KEY_PRIVATE }}" > ~/.ssh/wpe_key
          chmod 600 ~/.ssh/wpe_key
          ssh-keyscan -t rsa git.wpengine.com >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOL
          Host git.wpengine.com
            IdentityFile ~/.ssh/wpe_key
            StrictHostKeyChecking no
            IdentitiesOnly yes
          EOL

      # Build the deploy branch once and push it to both environments.
      # `git subtree split` extracts the wordpress/ subtree so its contents
      # become the root of the pushed tree, which is what WPE expects.
      - name: Build deploy branch (subtree split of wordpress/)
        run: git subtree split --prefix=wordpress -b deploy-branch

      - name: Deploy to dev (rodenlawdev1)
        run: |
          git remote add wpe-dev git@git.wpengine.com:rodenlawdev1.git
          git push wpe-dev deploy-branch:main --force

      # Prod requires the WPE_SSHG_KEY public key to be registered on the
      # rodenlawprod environment in the WP Engine portal. If this step
      # fails with "Permission denied (publickey)", add the public key
      # under: WPE Portal → rodenlawprod → SSH Gateway → Add SSH Key.
      - name: Deploy to prod (rodenlawprod)
        run: |
          git remote add wpe-prod git@git.wpengine.com:rodenlawprod.git
          git push wpe-prod deploy-branch:main --force
